<header class="section-header">
  <div class="copy">
    @if (eyebrow()) {
      <p class="eyebrow">{{ eyebrow() }}</p>
    }

    <h2>{{ title() }}</h2>
    @if (subtitle()) {
      <p class="subtitle">{{ subtitle() }}</p>
    }
  </div>

  @if (actionLabel()) {
    <a class="action" [routerLink]="actionPath()">{{ actionLabel() }}</a>
  }
</header>
